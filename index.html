<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Love Page</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ffc0cb, #ffe4e1);
  overflow: hidden;
  text-align: center;
}

h1 {
  margin-top: 80px;
  color: #d63384;
  text-shadow: 0 0 10px white;
}

.container {
  position: relative;
}

.buttons {
  margin-top: 40px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  margin: 10px;
  transition: 0.3s;
}

.yes {
  background: #ff4d6d;
  color: white;
}

.no {
  background: #6c757d;
  color: white;
  position: absolute;
}

#result {
  margin-top: 30px;
  font-size: 28px;
  color: #ff0066;
}

/* hearts */
.heart {
  position: fixed;
  width: 20px;
  height: 20px;
  background: red;
  transform: rotate(45deg);
  animation: float 6s linear infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
}

.heart::before {
  top: -10px;
  left: 0;
}

.heart::after {
  left: -10px;
  top: 0;
}

@keyframes float {
  0% {
    bottom: -10px;
    opacity: 0;
  }
  50% {
    opacity: 1;
  }
  100% {
    bottom: 100%;
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1 id="question">نسرين واش كتبغيني؟</h1>

<div class="container">
  <div class="buttons">
    <button class="yes" onclick="yesClick()">نعم</button>
    <button class="no" id="noBtn" onclick="noClick()">لا</button>
  </div>
</div>

<div id="result"></div>

<script>
const noTexts = ["منيتك 😏", "زيدي فكري 🤔", "واش بصح؟ 😅"];

function yesClick() {
  document.getElementById("result").innerHTML =
    "عارفك اكبيدتي كتبغيني ❤️😍";
}

function noClick() {
  const text = noTexts[Math.floor(Math.random() * noTexts.length)];
  document.getElementById("question").innerText = text;

  // تحريك زر لا
  const btn = document.getElementById("noBtn");
  const x = Math.random() * window.innerWidth * 0.7;
  const y = Math.random() * window.innerHeight * 0.5;

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

// hearts generator
setInterval(() => {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}, 300);
</script>

</body>
</html>
